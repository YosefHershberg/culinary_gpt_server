name: CulinaryGPT server CI

on:
  push:
    branches: [ "main" ]

# Deployment is handled by Railway's GitHub integration (auto-deploys on push).
# This workflow only runs the build + tests.

jobs:
  test:
    runs-on: [ubuntu-latest]

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      - run: npm ci
      - run: |
          touch .env
          echo "${{ secrets.PROD_ENV_FILE }}" > .env
      - run: npm run build --if-present
      - run: npm test
